<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>

<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
   
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: '#000000',
    textColor: '#000000',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS ||--o{ QUIZ_SESSIONS : creates
  USERS ||--o{ ROOMS : hosts
  USERS ||--o{ ROOM_PARTICIPANTS : joins
  USERS ||--o{ FRIENDSHIPS : requests
  USERS ||--o{ BLOG_POSTS : authors
  USERS ||--|| USER_STATS_SUMMARY : has

  SUBJECTS ||--o{ UNITS : contains
  UNITS ||--o{ LESSONS : contains
  LESSONS ||--o{ QUESTIONS : contains
  LESSONS ||--o{ QUIZ_SESSIONS : "practiced in"
  LESSONS ||--o{ ROOMS : "played in"

  QUIZ_SESSIONS ||--o{ QUESTION_ANSWERS : logs
  QUESTIONS ||--o{ QUESTION_ANSWERS : answered

  ROOMS ||--o{ ROOM_PARTICIPANTS : has
  ROOMS ||--o{ ROOM_CHAT_MESSAGES : has

  USERS {
    uuid id PK
    string username
    string role
    int streak_current
    int streak_best
  }
  SUBJECTS {
    uuid id PK
    string name
    int display_order
  }
  UNITS {
    uuid id PK
    uuid subject_id FK
    string name
  }
  LESSONS {
    uuid id PK
    uuid unit_id FK
    uuid subject_id FK
    string title
    bool is_published
  }
  QUESTIONS {
    uuid id PK
    uuid lesson_id FK
    uuid subject_id FK
    jsonb options
    int correct_index
    string difficulty
  }
  QUIZ_SESSIONS {
    uuid id PK
    uuid user_id FK
    uuid lesson_id FK
    string mode
    int correct_answers
  }
  QUESTION_ANSWERS {
    uuid id PK
    uuid session_id FK
    uuid question_id FK
    bool is_correct
  }
  ROOMS {
    uuid id PK
    uuid host_id FK
    uuid lesson_id FK
    string invite_code
    string status
  }
  ROOM_PARTICIPANTS {
    uuid id PK
    uuid room_id FK
    uuid user_id FK
    int score
  }
  ROOM_CHAT_MESSAGES {
    uuid id PK
    uuid room_id FK
    uuid user_id FK
    string content
  }
  FRIENDSHIPS {
    uuid id PK
    uuid requester_id FK
    uuid recipient_id FK
    string status
  }
  BLOG_POSTS {
    uuid id PK
    uuid author_id FK
    string title
    string status
  }
  USER_STATS_SUMMARY {
    uuid user_id PK
    int total_sessions
    int total_correct
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
